# OAuth 2.0 Device Flow Konfiguration (RFC 8628)
# Diese Datei kann durch ~/.t2demo/device-flow.properties zur Laufzeit überschrieben werden.
# Die Werte werden als Vorausfüllung in den Device-Flow-Dialog geladen.

device.auth.url=https://your-auth-server/oauth/device_authorization
token.url=https://your-auth-server/oauth/token
client.id=your-client-id
scope=openid profile
