# .github/workflows/build-dmg.yml
name: Build macOS Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest        # ← macOS-Runner
    env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: JDK 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: macOS-Paket bauen
        run: ./gradlew packageApp

      - name: App als ZIP packen und hochladen
        run: zip -r out/T2demoApp.zip out/T2demoApp.app

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: out/T2demoApp.zip
          retention-days: 30
