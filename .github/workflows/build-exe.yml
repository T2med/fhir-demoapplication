name: Build MSI Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Remove existing WiX versions
        run: |
          Remove-Item "C:\Program Files (x86)\WiX Toolset v3.14" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Program Files\WiX Toolset v3.14" -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Install WiX 3.11 (full)
        run: |
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile wix.zip
          New-Item -ItemType Directory -Path "C:\Program Files (x86)\WiX Toolset v3.11\bin" -Force
          Expand-Archive wix.zip -DestinationPath "C:\Program Files (x86)\WiX Toolset v3.11\bin" -Force
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Verify WiX
        run: |
          Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          candle.exe -?
        shell: pwsh

      - name: Build MSI
        run: ./gradlew packageApp
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/*.msi
