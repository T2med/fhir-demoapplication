name: Build MSI Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Find and add WiX to PATH
        run: |
          # Suche WiX-Installation
          $wixPaths = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.11\bin"
          )
          
          $foundPath = $null
          foreach ($path in $wixPaths) {
            if (Test-Path "$path\candle.exe") {
              $foundPath = $path
              break
            }
          }
          
          # Fallback: Dynamische Suche
          if (-not $foundPath) {
            $candle = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" `
              -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | 
              Select-Object -First 1
            if ($candle) {
              $foundPath = $candle.DirectoryName
            }
          }
          
          if ($foundPath) {
            Write-Host "WiX gefunden unter: $foundPath"
            echo "$foundPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Error "WiX Toolset nicht gefunden!"
            exit 1
          }
        shell: pwsh

      - name: Verify WiX
        run: candle.exe -?
        shell: pwsh

      - name: Build MSI
        run: ./gradlew packageApp
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/*.msi
