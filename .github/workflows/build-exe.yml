name: Build MSI Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Find WiX Path
        id: wix
        run: |
          $candle = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" `
            -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | 
            Select-Object -First 1
          $wixDir = $candle.DirectoryName
          $wixRoot = Split-Path $wixDir -Parent
          echo "wix_bin=$wixDir" >> $env:GITHUB_OUTPUT
          echo "wix_root=$wixRoot" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build MSI
        run: ./gradlew packageApp
        shell: cmd
        env:
          PATH: ${{ steps.wix.outputs.wix_bin }};${{ env.PATH }}
          WIX: ${{ steps.wix.outputs.wix_root }}\

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/*.msi
